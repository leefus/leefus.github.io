name: Nightly Notion Sync

on:
  schedule:
    # Runs every night at 2:00 AM UTC
    - cron: '0 2 * * *'
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    name: Fetch Notion data and update site

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Notion fetcher
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: node fetch-notion.js

      - name: Check if data.json changed
        id: changes
        run: |
          if git diff --quiet data.json 2>/dev/null || [ ! -f data.json ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push updated data.json
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "chore: nightly Notion sync $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      - name: No changes detected
        if: steps.changes.outputs.changed == 'false'
        run: echo "No changes in Notion data, skipping commit."
